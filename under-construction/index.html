<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Showtec | Lights & Sound</title>
    <meta name="description" content="Professional lighting and sound systems for events." />
    <meta name="keywords" content="lighting console, stage lighting, sound system philippines" />

    <!-- ================= BOOTSTRAP ================= -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- ================= GOOGLE FONTS ================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- ================= STYLES ================= -->
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
        }

        .uc-wrapper {
            max-width: 500px;
            padding: 20px;
            margin: 0 auto;
        }

        /* LOGO */
        .logo {
            width: 120px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            color: #aaa;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        .under-construction {
            min-height: 60vh;
            /* adjust if needed */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }
    </style>
    <link rel="stylesheet" href="/assets/css/typography.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />

    <!-- ================= FAVICON ================= -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon/favicon-16x16.png" />
    <link rel="manifest" href="/assets/images/favicon/site.webmanifest" />

    <!-- ================= JAVASCRIPT ================= -->
    <script src="/assets/js/main.js" defer></script>
</head>

<body class="bg-black fade-page">
    <section class="under-construction">
        <div class="uc-wrapper text-center">

            <img src="/assets/images/logo.png" alt="Logo" class="logo">

            <h1 class="pulse">UNDER CONSTRUCTION</h1>
            <p>This page isn't ready yet. We're still working on it.</p>

            <button class="btn-custom btn-primary-custom" onclick="goBack()">← Go Back</button>

        </div>
    </section>

    <script>
        function goBack() {
            if (document.referrer && document.referrer.includes(window.location.origin)) {
                window.location.href = document.referrer;
            } else {
                window.location.href = "/";
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
